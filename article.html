<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статья — 24AI</title>
    <meta name="description" content="">
    <link rel="icon" type="image/png" href="img/logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #d4a855;
            --gold-hover: #e5b966;
            --bg-primary: #0a0a0f;
            --bg-card: #12121a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .logo-img {
            height: 40px;
        }

        .nav {
            display: flex;
            gap: 32px;
        }

        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .nav a:hover {
            color: var(--text-primary);
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            text-align: center;
        }

        .btn-primary {
            background: var(--gold);
            color: #000 !important;
        }

        .btn-primary:hover {
            background: var(--gold-hover);
        }

        /* Article */
        .article-page {
            padding-top: 100px;
            min-height: 100vh;
        }

        .article-header {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 24px 40px;
        }

        .article-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--gold);
            text-decoration: none;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .article-back:hover {
            opacity: 0.8;
        }

        .article-meta {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 16px;
        }

        .article-title {
            font-size: 42px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 24px;
        }

        .article-description {
            font-size: 20px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .article-cover {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto 48px;
            padding: 0 24px;
        }

        .article-cover img {
            width: 100%;
            border-radius: 16px;
        }

        /* Article Content */
        .article-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 24px 80px;
        }

        .article-content h2 {
            font-size: 28px;
            margin: 48px 0 20px;
            color: var(--text-primary);
        }

        .article-content h3 {
            font-size: 22px;
            margin: 36px 0 16px;
            color: var(--text-primary);
        }

        .article-content h4 {
            font-size: 18px;
            margin: 28px 0 12px;
            color: var(--text-primary);
        }

        .article-content p {
            font-size: 18px;
            line-height: 1.8;
            color: #d0d0d0;
            margin-bottom: 20px;
        }

        .article-content ul,
        .article-content ol {
            margin: 20px 0;
            padding-left: 24px;
        }

        .article-content li {
            font-size: 18px;
            line-height: 1.8;
            color: #d0d0d0;
            margin-bottom: 8px;
        }

        .article-content blockquote {
            border-left: 4px solid var(--gold);
            padding-left: 24px;
            margin: 32px 0;
            font-style: italic;
            color: var(--text-secondary);
        }

        .article-content img {
            width: 100%;
            border-radius: 12px;
            margin: 32px 0;
        }

        .article-content .image-caption {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: -24px;
            margin-bottom: 32px;
        }

        .article-content hr {
            border: none;
            border-top: 1px solid #2a2a3a;
            margin: 48px 0;
        }

        .article-content a {
            color: var(--gold);
            text-decoration: underline;
        }

        .article-content a:hover {
            color: var(--gold-hover);
        }

        /* CTA */
        .article-cta {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            margin-top: 60px;
        }

        .article-cta h3 {
            margin-bottom: 12px;
        }

        .article-cta p {
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .article-cta .btn {
            display: inline-block;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            min-width: 200px;
        }

        /* Footer */
        .footer {
            background: var(--bg-card);
            padding: 40px 0;
            text-align: center;
            color: var(--text-secondary);
        }

        .footer a {
            color: var(--gold);
            text-decoration: none;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 100px 20px;
            color: var(--text-secondary);
        }

        .not-found {
            text-align: center;
            padding: 100px 20px;
        }

        .not-found h1 {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .not-found p {
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav {
                display: none;
            }

            .article-title {
                font-size: 28px;
            }

            .article-content h2 {
                font-size: 24px;
            }

            .article-content p,
            .article-content li {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <img src="img/logo.png" alt="24AI" class="logo-img">
            </a>
            <nav class="nav">
                <a href="index.html#cases">Кейсы</a>
                <a href="index.html#benefits">Решения</a>
                <a href="index.html#for-who">Для кого</a>
                <a href="articles.html">Статьи</a>
                <a href="index.html#faq">FAQ</a>
            </nav>
            <a href="index.html#contact" class="btn btn-primary">Связаться</a>
        </div>
    </header>

    <main class="article-page" id="articlePage">
        <div class="loading">Загрузка статьи...</div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2024 24AI. <a href="index.html">Вернуться на главную</a></p>
        </div>
    </footer>

    <script>
        const SUPABASE_URL = 'https://ulbgnmtevhyglebfkzil.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsYmdubXRldmh5Z2xlYmZremlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY5NDA4ODgsImV4cCI6MjA4MjUxNjg4OH0.EkCsEUJuQ9XKnaoefPv73MKXf5y74Ts3XiDTcWalOpk';

        async function loadArticle() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');

            if (!slug) {
                showNotFound();
                return;
            }

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/articles?slug=eq.${slug}&published=eq.true`, {
                    headers: { 'apikey': SUPABASE_ANON_KEY }
                });
                const articles = await response.json();

                if (articles.length === 0) {
                    showNotFound();
                    return;
                }

                const article = articles[0];
                displayArticle(article);
            } catch (error) {
                console.error('Error loading article:', error);
                showNotFound();
            }
        }

        function displayArticle(article) {
            // Update page title and meta
            document.title = `${article.title} — 24AI`;
            document.querySelector('meta[name="description"]').content = article.description || '';

            // Render article
            const container = document.getElementById('articlePage');
            
            let contentHtml = '';
            if (article.content) {
                const content = JSON.parse(article.content);
                contentHtml = renderEditorContent(content);
            }

            container.innerHTML = `
                <div class="article-header">
                    <a href="articles.html" class="article-back">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 18l-6-6 6-6"/>
                        </svg>
                        Все статьи
                    </a>
                    <div class="article-meta">${new Date(article.created_at).toLocaleDateString('ru', { day: 'numeric', month: 'long', year: 'numeric' })}</div>
                    <h1 class="article-title">${article.title}</h1>
                    ${article.description ? `<p class="article-description">${article.description}</p>` : ''}
                </div>
                ${article.cover_url ? `
                    <div class="article-cover">
                        <img src="${article.cover_url}" alt="${article.title}">
                    </div>
                ` : ''}
                <div class="article-content">
                    ${contentHtml}
                    <div class="article-cta">
                        <h3>Хотите автоматизировать свой бизнес?</h3>
                        <p>Оставьте заявку, и мы проведём бесплатный аудит ваших процессов</p>
                        <a href="index.html#contact" class="btn btn-primary">Оставить заявку</a>
                    </div>
                </div>
            `;
        }

        function renderEditorContent(content) {
            if (!content.blocks) return '';

            return content.blocks.map(block => {
                switch (block.type) {
                    case 'header':
                        return `<h${block.data.level}>${block.data.text}</h${block.data.level}>`;
                    
                    case 'paragraph':
                        return `<p>${block.data.text}</p>`;
                    
                    case 'list':
                        const tag = block.data.style === 'ordered' ? 'ol' : 'ul';
                        const items = block.data.items.map(item => `<li>${item}</li>`).join('');
                        return `<${tag}>${items}</${tag}>`;
                    
                    case 'quote':
                        return `<blockquote>${block.data.text}${block.data.caption ? `<footer>— ${block.data.caption}</footer>` : ''}</blockquote>`;
                    
                    case 'image':
                        return `
                            <img src="${block.data.file.url}" alt="${block.data.caption || ''}">
                            ${block.data.caption ? `<p class="image-caption">${block.data.caption}</p>` : ''}
                        `;
                    
                    case 'delimiter':
                        return '<hr>';
                    
                    default:
                        return '';
                }
            }).join('');
        }

        function showNotFound() {
            document.getElementById('articlePage').innerHTML = `
                <div class="not-found">
                    <h1>404</h1>
                    <p>Статья не найдена</p>
                    <a href="articles.html" class="btn btn-primary">Все статьи</a>
                </div>
            `;
        }

        loadArticle();
    </script>
</body>
</html>
