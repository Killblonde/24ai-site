<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статьи об автоматизации бизнеса — 24AI</title>
    <meta name="description" content="Полезные статьи об автоматизации бизнес-процессов, интеграции CRM, чат-ботах и искусственном интеллекте для бизнеса.">
    <link rel="icon" type="image/png" href="img/logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #d4a855;
            --gold-hover: #e5b966;
            --bg-primary: #0a0a0f;
            --bg-card: #12121a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .logo-img {
            height: 40px;
        }

        .nav {
            display: flex;
            gap: 32px;
        }

        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .nav a:hover {
            color: var(--text-primary);
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--gold);
            color: #000;
        }

        .btn-primary:hover {
            background: var(--gold-hover);
        }

        /* Main */
        .main {
            padding-top: 100px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .page-header {
            text-align: center;
            padding: 60px 0;
        }

        .page-header h1 {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Articles Grid */
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 32px;
            padding-bottom: 80px;
        }

        .article-card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .article-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .article-card a {
            text-decoration: none;
            color: inherit;
        }

        .article-cover {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #1a1a24;
        }

        .article-content {
            padding: 24px;
        }

        .article-date {
            color: var(--gold);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .article-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
            line-height: 1.4;
        }

        .article-excerpt {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
        }

        .no-articles {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }

        .no-articles h2 {
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        /* Footer */
        .footer {
            background: var(--bg-card);
            padding: 40px 0;
            text-align: center;
            color: var(--text-secondary);
        }

        .footer a {
            color: var(--gold);
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav {
                display: none;
            }

            .page-header h1 {
                font-size: 32px;
            }

            .articles-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <img src="img/logo.png" alt="24AI" class="logo-img">
            </a>
            <nav class="nav">
                <a href="diagnostika.html">Диагностика</a>
                <a href="index.html#cases">Кейсы</a>
                <a href="index.html#benefits">Решения</a>
                <a href="index.html#for-who">Для кого</a>
                <a href="articles.html">Статьи</a>
                <a href="index.html#faq">FAQ</a>
            </nav>
            <a href="index.html#contact" class="btn btn-primary">Связаться</a>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="page-header">
                <h1>Статьи</h1>
                <p>Полезные материалы об автоматизации бизнеса, чат-ботах, интеграциях и искусственном интеллекте</p>
            </div>

            <div class="articles-grid" id="articlesGrid">
                <div class="no-articles">
                    <p>Загрузка...</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2024 24AI. <a href="index.html">Вернуться на главную</a></p>
        </div>
    </footer>

    <script>
        const SUPABASE_URL = 'https://ulbgnmtevhyglebfkzil.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsYmdubXRldmh5Z2xlYmZremlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY5NDA4ODgsImV4cCI6MjA4MjUxNjg4OH0.EkCsEUJuQ9XKnaoefPv73MKXf5y74Ts3XiDTcWalOpk';

        async function loadArticles() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/articles?published=eq.true&order=created_at.desc`, {
                    headers: { 'apikey': SUPABASE_ANON_KEY }
                });
                const articles = await response.json();
                
                const container = document.getElementById('articlesGrid');
                
                if (articles.length === 0) {
                    container.innerHTML = `
                        <div class="no-articles" style="grid-column: 1 / -1;">
                            <h2>Статьи скоро появятся</h2>
                            <p>Мы готовим полезные материалы об автоматизации бизнеса. Подпишитесь на наш Telegram, чтобы не пропустить!</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = articles.map(article => `
                    <article class="article-card">
                        <a href="article.html?slug=${article.slug}">
                            ${article.cover_url 
                                ? `<img src="${article.cover_url}" alt="${article.title}" class="article-cover">`
                                : `<div class="article-cover"></div>`
                            }
                            <div class="article-content">
                                <div class="article-date">${new Date(article.created_at).toLocaleDateString('ru', { day: 'numeric', month: 'long', year: 'numeric' })}</div>
                                <h2 class="article-title">${article.title}</h2>
                                <p class="article-excerpt">${article.description || ''}</p>
                            </div>
                        </a>
                    </article>
                `).join('');
            } catch (error) {
                console.error('Error loading articles:', error);
                document.getElementById('articlesGrid').innerHTML = `
                    <div class="no-articles" style="grid-column: 1 / -1;">
                        <p>Ошибка загрузки статей</p>
                    </div>
                `;
            }
        }

        loadArticles();
    </script>
    <script defer src="widget.js"></script>
</body>
</html>
